services:
  # Backend Service
  - type: web
    name: food-rescue-backend
    env: node
    rootDir: food-rescue/food-rescue-backend
    buildCommand: |
      curl -O https://archive.apache.org/dist/maven/maven-3/3.8.6/binaries/apache-maven-3.8.6-bin.tar.gz &&
      tar -xzf apache-maven-3.8.6-bin.tar.gz &&
      export PATH=$PWD/apache-maven-3.8.6/bin:$PATH &&
      mvn clean package -DskipTests
    startCommand: java -jar target/food-rescue-backend-1.0.0.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: JWT_SECRET
        value: foodRescueSecretKey2024ForProduction
      - key: PORT
        value: 10000
      
  # Frontend Service
  - type: web
    name: food-rescue-frontend
    env: static
    rootDir: food-rescue/food-rescue-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://food-rescue-backend.onrender.com