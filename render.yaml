services:
  - type: web
    name: food-rescue-backend
    env: java
    repo: https://github.com/tarakkrishna/food-rescue-platform.git
    rootDir: food-rescue-backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/food-rescue-backend-1.0.0.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: JWT_SECRET
        value: foodRescueSecretKey2024ForProduction
      
  - type: pserv
    name: food-rescue-db
    env: mysql
    plan: free
    databases:
      - name: food_rescue
        user: foodrescue
      
  - type: web
    name: food-rescue-frontend
    env: static
    repo: https://github.com/tarakkrishna/food-rescue-platform.git
    rootDir: food-rescue-frontend
    buildCommand: npm run build
    publishDirectory: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://food-rescue-backend.onrender.com
