services:
  # Backend Service
  - type: web
    name: food-rescue-backend
    env: node
    rootDir: food-rescue/food-rescue-backend
    buildCommand: |
      apt-get update && apt-get install -y openjdk-17-jdk && 
      export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64 && 
      mvn clean package -DskipTests
    startCommand: |
      export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64 && 
      java -jar target/food-rescue-backend-1.0.0.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: JWT_SECRET
        value: foodRescueSecretKey2024ForProduction
      - key: PORT
        value: 10000
      
  # Frontend Service
  - type: web
    name: food-rescue-frontend
    env: static
    rootDir: food-rescue/food-rescue-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://food-rescue-backend.onrender.com