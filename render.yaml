services:
  # Backend Service
  - type: web
    name: food-rescue-backend
    env: docker
    rootDir: food-rescue/food-rescue-backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/*.jar
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: JWT_SECRET
        value: foodRescueSecretKey2024ForProduction
      - key: PORT
        value: 10000
      
  # Frontend Service
  - type: web
    name: food-rescue-frontend
    env: static
    rootDir: food-rescue/food-rescue-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://food-rescue-backend.onrender.com